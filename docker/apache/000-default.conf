<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    # Apuntamos a la carpeta public, que es el punto de entrada de Laravel
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Configuración de Logs (útil para ver errores en Dokploy)
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Evitar que se vean archivos sensibles
    <FilesMatch "^\.env">
        Order allow,deny
        Deny from all
    </FilesMatch>
</VirtualHost>