version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indago-app-prod
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-indago}
      - DB_USERNAME=${DB_USERNAME:-indago}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      # Las demás variables (APP_KEY, etc.) las configuras en el panel de Dokploy
    volumes:
      - storage-data:/var/www/html/storage
    labels:
      - "traefik.enable=true"
      # Remplaza ${DOMAIN} por tu dominio configurado en el .env de Dokploy o directamente pon tu dominio, ej: midominio.com
      - "traefik.http.routers.indago-app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.services.indago-app.loadbalancer.server.port=80"
      - "traefik.http.routers.indago-app.entrypoints=websecure"
      - "traefik.http.routers.indago-app.tls.certresolver=letsencrypt"
    networks:
      - dokploy-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indago-queue-prod
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-indago}
      - DB_USERNAME=${DB_USERNAME:-indago}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      - db
    networks:
      - dokploy-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indago-scheduler-prod
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-indago}
      - DB_USERNAME=${DB_USERNAME:-indago}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      - db
    networks:
      - dokploy-network

  db:
    image: mysql:8.0
    container_name: indago-db-prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-indago}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-indago}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  mysql-data:
  storage-data:
