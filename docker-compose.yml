version: '3'

services:
  # Servicio de aplicación PHP (Apache incluido)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: laravel
        uid: 1000
    container_name: indago-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    networks:
      - indago-network

  # Servicio de MySQL
  db:
    image: mysql:8.0
    container_name: indago-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-indago}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-indago}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - indago-network

networks:
  indago-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
